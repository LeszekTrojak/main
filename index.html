<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <title>Product Card</title>
</head>

<body>

  <main class="card">
    
    <img src="image-product-desktop.jpg" alt="Gabrielle perfume" class="card__image">

    <div class="card__content">
      
      <p class="card__category">Perfume</p>

      <h1 class="card__title">
        Gabrielle Essence Eau De Parfum
      </h1>

      <p class="card__description">
        A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.
      </p>

      <div class="card__price">
        <span class="price--current">$149.99</span>
        <span class="price--old">$169.99</span>
      </div>

      <button class="card__button">
        Add to Cart
      </button>

    </div>

  </main>

</body>
</html>
